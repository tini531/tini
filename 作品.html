/* 確定父層有定位，以便絕定位的偽元素依附 */
.box1 .pic {
  position: relative;
  /* 如果有圖片，記得設定 z-index 確保偽元素在正確的層級 */
}
.box1 a{
  text-decoration: none;
}
.box1 h4 span{
  font-size:16px;
  letter-spacing:14px;
}
.box1 h4{
  letter-spacing:2px;
  line-height:30px;
  position:relative;
  overflow: hidden;
  display: inline-block;
  padding-bottom:20px;
}
.box1 h4::before{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:1px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  animation: lineMove 2s linear infinite; 
}





/* 定義動畫軌跡 */
@keyframes lineMove {
  0% {
    transform: translateX(-100%); /* 從最左邊外側開始 */
  }
  100% {
    transform: translateX(100%);  /* 一直移動到最右邊外側 */
  }
}

.box1 P{
  color:#fff;
  letter-spacing:2px;
  text-align:center;
}
/* 預設的漸層：from right */
.box1 .pic::after {
  position: absolute;
  content: '';
  width: 60%;

  background: linear-gradient(to right, #000000, #e1ec8b);
  border-radius: 50%;
  top: 0; bottom: 0; left: 0; right: 0;
  margin: auto;
  z-index: -1;
  aspect-ratio: 1 / 1;
  /* 這裡只留 transform 的轉場 */
  transition: transform 0.5s; 
}

/* 新增一個 ::before，畫出 hover 後想要的漸層 (from left)，並預設隱藏 (opacity: 0) */
.box1 .pic::before {
  position: absolute;
  content: '';
  width: 60%;

  background: linear-gradient(to left, #000000, #e1ec8b);
  border-radius: 50%;
  top: 0; bottom: 0; left: 0; right: 0;
  margin: auto;
  z-index: -1;
  aspect-ratio: 1 / 1;
  opacity: 0; /* 預設完全透明 */
  /* border: 1px solid #e1ec8b; */
  
  /* 關鍵：讓透明度可以平滑轉場 */
  transition: opacity 0.5s background 0.5s; 
  top: 0; bottom: 0; left: 0; right: 0;
}

/* 滑鼠懸停時的效果 */
.box1 .pic:hover::before {
  opacity: 1; /* hover 時，讓 to left 的漸層顯現出來，蓋在原本的上面 */
  
}

.box1 .pic:hover::after {
  /* 如果 hover 時想要有放大縮小或其他動態，可以加在這裡 */
  transform: scale(1.1); 
  transform: rotate(180deg) !important;
}

    /* 全域外層：用 flex 讓多排跑馬燈垂直排列，並加上間距 */
  .marquee-wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px; /* 每一排之間的距離 */
    
    padding: 40px 0;
  }

  .marquee {
    display: flex;
    overflow: hidden; /* 隱藏溢出的部分 */
    user-select: none;
    gap: 20px;
    width: 100%;
    padding:10px 0;
  }

  .marquee-content {
    display: flex;
    justify-content: space-around;
    min-width: 100%; /* 確保一組內容至少佔滿整個寬度 */
    gap: 20px;
    flex-shrink: 0; /* 防止被擠壓 */
  }

  /* 調整圖片大小與樣式 */
  .marquee-content img {
    width:330px;
    height:330px;
    object-fit: cover; /* 確保圖片裁剪得宜 */
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: box-shadow 0.5s;
  }


  /* 滑鼠懸停時暫停整排跑馬燈 */
  .marquee:hover .marquee-content {
    animation-play-state: paused;
    
  }
 .marquee-content img:hover{
    box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.8);
}
  /* ========================================================
     為不同的排次（Row）設定專屬的動畫速度與方向
     ======================================================== */
  
  /* 第一排：往左移，速度 15 秒 */
  .row-1 .marquee-content {
    animation: scroll-left 15s linear infinite;
  }

  /* 第二排：往右移（反向），速度 20 秒 */
  .row-2 .marquee-content {
    animation: scroll-right 20s linear infinite;
  }

  /* 第三排：往左移，速度 12 秒（稍微快一點） */
  .row-3 .marquee-content {
    animation: scroll-left 12s linear infinite;
  }


  /* ========================================================
     動畫定義（Keyframes）
     ======================================================== */
  
  /* 往左滾動 */
  @keyframes scroll-left {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }

  /* 往右滾動 */
  @keyframes scroll-right {
    from { transform: translateX(-100%); }
    to { transform: translateX(0); }
  }


body {

/* 游標主容器 */
#custom-cursor {
  position: fixed;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  pointer-events: none;
  z-index: 9999;
}

/* 中心實心點 */
.cursor-dot {
  width: 6px;
  height: 6px;
  background-color: #fff;
  border-radius: 50%;
  position: absolute;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease;
}

/* 外圈特殊線條 */
.cursor-circle {
  width: 30px;
  height: 30px;
  border: 1px solid #ffffff; /* 科技感青色線條 */
  border-radius: 50%;
  position: absolute;
  transform: translate(-50%, -50%) scale(1);
  /* 使用 cubic-bezier 營造彈性感受 */
  transition: 
    transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
    border-color 0.3s ease, 
    background-color 0.3s ease;
}

/* ------------ 動畫觸發狀態 ------------ */

/* 當碰到物件時：外圈猛烈放大並變色，中心點縮小 */
#custom-cursor.hovered .cursor-circle {
  transform: translate(-50%, -50%) scale(2);
  border: 1px solid #ffffff;
  border-color: #e1ec8b; /* 變成霓虹粉 */
  background-color: rgba(173, 255, 166, 0); /* 淡淡的內斂發光 */
  border-radius: 100%; /* 順便從圓形扭曲成「圓角正方形」，增加特殊形狀感 */
}

#custom-cursor.hovered .cursor-dot {
  transform: translate(-50%, -50%) scale(0); /* 中心點消失，視覺更乾淨 */
}

    <script>
const cursor = document.getElementById('custom-cursor');
const targets = document.querySelectorAll('.hover-target');

// 滑鼠的真實座標
let mouseX = 0, mouseY = 0;
// 自訂游標的當前座標（落後於真實滑鼠）
let cursorX = 0, cursorY = 0;

// 監聽真實滑鼠位置
window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 每幀更新動畫（核心：讓游標永遠只走完與滑鼠剩餘距離的 10%）
function render() {
  // 調整 0.1 這個數值，越小越黏、延遲感越重；越大越精準跟隨
  cursorX += (mouseX - cursorX) * 0.15;
  cursorY += (mouseY - cursorY) * 0.15;
  
  cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;
  
  requestAnimationFrame(render);
}
requestAnimationFrame(render); // 啟動動畫循環

// 碰觸物件的縮放狀態切換
targets.forEach(target => {
  target.addEventListener('pointerenter', () => cursor.classList.add('hovered'));
  target.addEventListener('pointerleave', () => cursor.classList.remove('hovered'));
});
    </script>
