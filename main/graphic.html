    <style>
        body{
            background-color: #000000;
        }
        .item{
            background-color: #00ad98;
            width:100%;
            padding:100px 10px;
            display: flex;
            justify-content: center;
        }
        .item button{
            background-color: rgb(0,0,0,0);
            border:none;
        }
        .item button a{
            background-color: none;
            border:1px solid #fff;
            padding:10px 20px;
            color:#fff;
            text-decoration: none;
            border-radius: 100px;
            font-size:20px;
            font-weight:bold;
            transition: all 0.5s;
        }
        .item button a:hover{
            background-color: #fff;
            color:#00ad98;
        }
        
        .box .arrow{
            position:fixed;
            top:50px;
            left:50px;
        }
        .box .arrow button{
            background-color: rgb(31, 31, 31);
            border:none;
            color:#fff;
            padding:10px;
        }
        @media (max-width: 768px) {
            .box .arrow button{
                font-size:8px;
                padding:5px;
            }
            .item button a
            {
                font-size:8px;
                padding:5px;
            }
            .item{
                padding:50px;
            }
        }
    </style>
</head>
